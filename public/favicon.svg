<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Rounded white background container -->
  <rect x="4" y="4" width="120" height="120" rx="32" fill="#ffffff" stroke="#1e293b" stroke-width="4.5"/>
  <rect x="10" y="10" width="108" height="108" rx="26" fill="#eff6ff" opacity="0.6"/>
  
  <!-- Yellow safety construction helmet -->
  <path d="M34,45 C34,22 94,22 94,45 Z" fill="#fec001" stroke="#1e293b" stroke-width="4.5" stroke-linejoin="round"/>
  <!-- Helmet Brim -->
  <path d="M24,45 L104,45 C107,45 107,51 104,51 L24,51 C21,51 21,45 24,45 Z" fill="#f59e0b" stroke="#1e293b" stroke-width="4.5" stroke-linejoin="round"/>
  <!-- Blue Star on Helmet -->
  <path d="M64,26 L66.35,31.5 L72,32 L67.8,35.6 L69.1,41.2 L64,38.3 L58.9,41.2 L60.2,35.6 L56,32 L61.65,31.5 Z" fill="#2563eb" stroke="#1e293b" stroke-width="1.5" stroke-linejoin="round"/>
  
  <!-- Arabic Calligraphy "عبور لاند" -->
  <g fill="none" stroke="#2563eb" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cursive text outlines matching the logo style -->
    <path d="M50,66 C42,66 38,61 38,55 C38,49 46,45 54,45 C66,45 64,62 78,62 C85,62 90,57 90,52" />
    <path d="M52,86 L44,86 C40,86 40,80 40,74" />
    <path d="M52,86 C64,86 68,76 74,76 C80,76 82,86 94,86" />
    <circle cx="82" cy="70" r="3.5" fill="#2563eb" stroke="none"/>
  </g>
  
  <!-- Left Side: Red electric power drill -->
  <g transform="translate(18, 70) rotate(-10)">
    <path d="M4,10 L18,10 C22,10 24,14 24,18 L24,24 L16,24 L12,18 Z" fill="#ef4444" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
    <rect x="6" y="24" width="8" height="11" rx="2" fill="#ef4444" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
    <rect x="24" y="15" width="4" height="6" fill="#94a3b8" stroke="#1e293b" stroke-width="2"/>
    <path d="M28,18 L34,18" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Right Side: Yellow saw tool -->
  <g transform="translate(88, 72) rotate(10)">
    <rect x="0" y="8" width="9" height="18" rx="2" fill="#f59e0b" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
    <path d="M-15,13 L0,13 L0,21 L-15,21 C-13,19 -12,18 -13,17 C-12,15 -13,14 -15,13" fill="#cbd5e1" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
  </g>
  
  <!-- Bottom Edge: Colorful childhood/building block gears & modules -->
  <g transform="translate(42, 100)" stroke="#1e293b" stroke-width="3" stroke-linejoin="round">
    <rect x="0" y="4" width="13" height="11" rx="2" fill="#22c55e"/>
    <rect x="16" y="4" width="13" height="11" rx="2" fill="#f97316"/>
    <rect x="32" y="4" width="13" height="11" rx="2" fill="#06b6d4"/>
  </g>
</svg>
